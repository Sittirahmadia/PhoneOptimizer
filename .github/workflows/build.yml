name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install sistem dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev cmake \
            libltdl-dev lld

      - name: 📦 Install buildozer & Cython
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer==1.5.0 cython==0.29.36

      - name: 🗃️ Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: ✅ Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: 🔨 Build APK (debug)
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

      - name: 🔍 Cari lokasi APK
        if: always()
        run: |
          echo "=== Isi folder bin/ ==="
          ls -la bin/ 2>/dev/null || echo "Folder bin/ tidak ada"
          echo ""
          echo "=== Cari semua file .apk ==="
          find . -name "*.apk" 2>/dev/null || echo "Tidak ada .apk ditemukan"
          echo ""
          echo "=== 50 baris terakhir build log ==="
          tail -50 build.log

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneOptimizer-APK
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: 📤 Upload build log (selalu)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
